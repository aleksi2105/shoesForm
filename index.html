<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/normalize.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <script src="./js/main.js" defer></script>
    <title>Каталог обуви</title>
  </head>
  <body>
    <div class="container">
      <div class="wrapper">
        <h1 class="form-title">Добавить обувь</h1>
        <form action="" id="shoeForm">
          <div class="form-basic">
            <div class="input-group">
              <label class="input-group-label">Тип обуви<span>*</span></label>
              <select id="shoeType" class="form-select" required>
                <option value="" disabled selected>
                  – Выберите категорию –
                </option>
                <option value="dressShoes">Туфли</option>
                <option value="sneakers">Кроссовки</option>
                <option value="boots">Сапоги</option>
              </select>
            </div>
            <div class="input-group">
              <label class="input-group-label">Бренд <span>*</span></label>
              <input
                type="text"
                id="brand"
                class="form-input"
                placeholder="Например: Timberland, Nike"
                required
              />
            </div>
            <div class="input-group">
              <label class="input-group-label">Размер<span>*</span></label>
              <input
                type="number"
                step="0.5"
                id="size"
                class="form-input"
                placeholder="36-46"
                required
              />
            </div>
            <div class="input-group">
              <label class="input-group-label">Цвет <span>*</span></label>
              <input
                type="text"
                id="color"
                class="form-input"
                placeholder="Чёрный"
                required
              />
            </div>
            <div class="input-group">
              <label class="input-group-label">Материал <span>*</span></label>
              <input
                type="text"
                id="material"
                class="form-input"
                placeholder="Натуральная кожа"
                required
              />
            </div>
            <div class="input-group">
              <label class="input-group-label">Цена<span>*</span></label>
              <input
                type="number"
                id="price"
                class="form-input"
                placeholder="0"
                required
              />
            </div>
            <div class="input-group">
              <label class="input-group-label">Детские <span>*</span></label>
              <input
                type="checkbox"
                id="forKids"
                class="input-checkbox"
                required
              />
            </div>
          </div>
          <div
            id="dynamicContainer"
            class="dynamic-fields"
            style="display: none"
          ></div>
        </form>
      </div>
      <div class="wrapper"></div>
    </div>
  </body>
</html>
